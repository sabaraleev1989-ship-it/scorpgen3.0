<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>ScorpGEN 3.0 • Страйкбол Сценарии</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: #0a0f07;
      overflow-x: hidden;
    }

    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at 30% 40%, #2d210b, #040301);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    .splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .scorpion-art {
      font-size: 10rem;
      filter: drop-shadow(0 0 40px #d49b3b) drop-shadow(0 0 80px #b45f1a);
      color: #ecb155;
      margin-bottom: 1rem;
      animation: floatScorp 3s infinite ease-in-out;
      user-select: none;
    }
    @keyframes floatScorp {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    .splash-title {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: #e7bc5c;
      text-shadow: 0 0 25px #b3741e, 0 8px 15px black;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
    }
    .splash-sub {
      color: #c7a86b;
      font-size: 1.3rem;
      letter-spacing: 2px;
      margin-bottom: 3rem;
      border-bottom: 2px solid #b4943b;
      padding-bottom: 0.5rem;
    }
    .start-btn {
      background: #dba942;
      border: none;
      font-size: 1.8rem;
      font-weight: bold;
      padding: 1.3rem 3.5rem;
      border-radius: 4rem;
      letter-spacing: 3px;
      color: #0e1c05;
      cursor: pointer;
      background: linear-gradient(180deg, #f3cd60 0%, #b57c1a 100%);
      box-shadow: 0 20px 35px rgba(0,0,0,0.8), 0 0 30px #ffb732;
      transition: 0.25s;
      text-transform: uppercase;
      border: 1px solid #fde49b;
    }
    .start-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 25px 45px black, 0 0 55px #f90;
    }

    .main-app {
      min-height: 100vh;
      padding: 1.2rem;
      background: #141e0e;
      background-image: linear-gradient(145deg, #1a2b13 0%, #0b1307 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app-container {
      max-width: 950px;
      width: 100%;
      background: rgba(16, 22, 9, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 2.8rem;
      padding: 1.8rem 2.2rem 2.8rem;
      box-shadow: 0 35px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(210, 180, 90, 0.4);
      border: 1px solid #6b8144;
      color: #f0ebce;
      transition: all 0.2s;
    }
    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }
    .logo-small {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 15px #cf9f2c);
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #e6c468;
      text-shadow: 0 5px 12px #1e2d0c;
      text-transform: uppercase;
    }
    .subtitle {
      text-align: center;
      color: #b9b272;
      margin-bottom: 2rem;
      font-style: italic;
      border-bottom: 1px dashed #6c8042;
      padding-bottom: 0.7rem;
      font-weight: 500;
    }
    .control-panel {
      background: #1b2614;
      border-radius: 2.2rem;
      padding: 1.6rem 1.6rem 1.3rem;
      margin-bottom: 2rem;
      border: 1px solid #5a7340;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.6);
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .task-badge {
      background: #28361c;
      border: 1px solid #8ea15b;
      padding: 0.65rem 1.3rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #e2e9bc;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.5px;
    }
    .task-badge input[type="checkbox"] {
      accent-color: #e6b422;
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
    }
    .task-badge:hover {
      background: #41582c;
      border-color: #dbb446;
    }
    .rule-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem 0 1.2rem;
    }
    .rule-btn {
      background: #1d2915;
      border: 1px solid #687845;
      color: #d4daaf;
      font-weight: 600;
      padding: 0.75rem 1.7rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .rule-btn.active {
      background: #8f9e3c;
      border-color: #f5e37c;
      color: #0f1a03;
      font-weight: bold;
      box-shadow: 0 0 18px #c7b142;
    }
    .generate-btn {
      background: #c9a13b;
      border: none;
      color: #122004;
      font-weight: 800;
      font-size: 1.3rem;
      padding: 0.9rem 2.3rem;
      border-radius: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.8rem auto 0.2rem;
      gap: 0.4rem;
      background: linear-gradient(180deg, #ecc356 0%, #a67c22 100%);
      border: 1px solid #ffe48b;
      box-shadow: 0 12px 22px rgba(0,0,0,0.6);
      transition: 0.2s;
      width: fit-content;
    }
    .generate-btn:hover {
      filter: brightness(1.2);
      transform: scale(1.03);
    }
    .scenario-card {
      background: #192312;
      border-radius: 2rem;
      padding: 1.9rem;
      border: 1px solid #85994d;
      box-shadow: 0 18px 30px rgba(0,0,0,0.7);
      margin-top: 1.3rem;
    }
    .legend-box {
      background: #0e1607;
      border-left: 7px solid #cc9f2c;
      padding: 1.5rem;
      border-radius: 1.3rem;
      margin-bottom: 1.8rem;
      color: #e6dbb0;
      box-shadow: inset 0 0 18px #000000;
      font-size: 1rem;
      line-height: 1.6;
    }
    .legend-title {
      font-weight: 800;
      color: #fad158;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
      font-size: 1rem;
    }
    .teams-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
      margin: 1.8rem 0 1.2rem;
    }
    @media (max-width: 580px) {
      .teams-container { grid-template-columns: 1fr; }
      .app-container { padding: 1.5rem 1.2rem; }
    }
    .team-block {
      border-radius: 1.7rem;
      padding: 1.4rem;
      border: 1px solid;
      position: relative;
    }
    .team-alpha {
      border-color: #cb9e40;
      background: linear-gradient(145deg, #2d391d, #192012);
    }
    .team-bravo {
      border-color: #5a7d43;
      background: linear-gradient(145deg, #1e2c15, #0f1a0a);
    }
    .team-name {
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .objective-text {
      background: #0b1105;
      padding: 0.9rem;
      border-radius: 1rem;
      color: #e2e4bb;
      font-weight: 500;
      line-height: 1.5;
      font-size: 0.98rem;
    }
    .rules-highlight {
      background: #273318;
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1.5rem 0 0.6rem;
      font-weight: 600;
      color: #f9e599;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      border: 1px dashed #caaf41;
    }
    .unique-id {
      font-size: 0.7rem;
      color: #6f7d55;
      text-align: right;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="scorpion-art">🦂</div>
    <div class="splash-title">ScorpGEN 3.0</div>
    <div class="splash-sub">тактический генератор</div>
    <button class="start-btn" id="startBtn">НАЧАТЬ</button>
  </div>

  <div class="main-app" id="mainApp" style="display: none;">
    <div class="app-container">
      <div class="app-header">
        <span class="logo-small">🦂</span>
        <h1>ScorpGEN 3.0</h1>
      </div>
      <div class="subtitle">бесконечные пересекающиеся сценарии</div>

      <div class="control-panel">
        <div class="badge-row">
          <label class="task-badge"><input type="checkbox" id="taskCapture" checked> Захват / Оборона</label>
          <label class="task-badge"><input type="checkbox" id="taskElimination" checked> Ликвидация / Охрана</label>
          <label class="task-badge"><input type="checkbox" id="taskIntel" checked> Данные / Контрразведка</label>
          <label class="task-badge"><input type="checkbox" id="taskEscort" checked> Эскорт / Перехват</label>
          <label class="task-badge"><input type="checkbox" id="taskDemolition" checked> Подрыв / Разминирование</label>
        </div>

        <div class="rule-selector">
          <span style="color:#cdbc6a; margin-right:0.3rem; font-weight:600;">⚙️ Режим ранений:</span>
          <button class="rule-btn active" data-rule="hardcore">ХАРДКОР</button>
          <button class="rule-btn" data-rule="realistic">РЕАЛИЗМ</button>
        </div>

        <button class="generate-btn" id="generateBtn">↻ Сгенерировать</button>
      </div>

      <div class="scenario-card" id="scenarioDisplay"></div>
    </div>
  </div>

  <script>
    (function() {
      const splashScreen = document.getElementById('splashScreen');
      const mainApp = document.getElementById('mainApp');
      const startBtn = document.getElementById('startBtn');

      startBtn.addEventListener('click', () => {
        splashScreen.classList.add('hidden');
        mainApp.style.display = 'flex';
        generateScenario();
      });

      // ---------- БАЗЫ ПЕРЕМЕННЫХ (РАСШИРЕННЫЕ) ----------
      const locations = [
        "Заброшенный завод «Сталь-9»", "Лесной полигон «Туман»", "Горный перевал «Орлиное гнездо»",
        "Посёлок «Северный» (руины)", "Бункер 42-бис", "Нефтебаза «Черное золото»",
        "Ж/д станция «Узловая»", "Портовая зона «Док-7»", "Пустынный форт «Мирамар»",
        "Подземный тоннель «Крот»", "Затопленный ангар", "Химический завод «Вихрь»",
        "Лесопилка «Глухомань»", "Складской комплекс «Терминал»", "Радиовышка «Эхо»",
        "Монастырь «Святой Луч»", "Брошенный госпиталь", "Карьер «Гранит»",
        "Оружейный завод «Молот»", "Дамба «Бетон-12»", "Убежище «Нора»"
      ];

      const atmospheres = [
        "густой туман, видимость 20 метров", "проливной дождь и скользкая грязь",
        "ранние сумерки, длинные тени", "пасмурное небо, ветер 10 м/с",
        "солнечный полдень, жара +32°C", "ночная операция, только ПНВ",
        "дым от лесного пожара поблизости", "снежные заносы, -5°C", "туман и запах гари",
        "сильная гроза, вспышки молний", "полнолуние, холодный ветер"
      ];

      const sideNamesA = ["Альфа", "Волкодавы", "Группа «Шторм»", "Отряд «Корсар»", "Сектор 7", "Ястребы", "Кобра", "Мангусты"];
      const sideNamesB = ["Браво", "Теневики", "Картель «Черный»", "Ополчение «Восток»", "Наёмники «Гадюка»", "Фантом", "Коготь", "Шершни"];

      // БАЗОВЫЕ ЭЛЕМЕНТЫ ДЛЯ БЕСКОНЕЧНЫХ ЛЕГЕНД
      const legendIntros = [
        "Разведка только что сообщила:", "Перехвачена вражеская радиограмма:", "Местный информатор передал:",
        "Спутниковые снимки зафиксировали:", "Беженец рассказал:", "Захваченный пленный признался:",
        "Датчики движения засекли:", "Дрон-разведчик обнаружил:"
      ];
      const legendSubjects = [
        "диверсионная группа", "вражеский спецназ", "колонна техники", "секретный груз",
        "командный пункт", "конвой с боеприпасами", "полевой госпиталь", "склад ГСМ",
        "передвижная РЛС", "узел связи", "замаскированный бункер", "снайперская позиция"
      ];
      const legendActions = [
        "готовится к штурму", "минирует подходы", "эвакуирует ценный груз", "разворачивает ПВО",
        "ждёт подкрепления", "закладывает взрывчатку", "передаёт шифрованные данные", "охраняет пленного офицера",
        "ремонтирует повреждённую технику", "проводит перегруппировку", "устанавливает растяжки"
      ];
      const legendUrgency = [
        "Время играет против нас.", "Медлить нельзя — операция должна начаться немедленно.",
        "Командование требует решительных действий.", "Каждая минута на счету.",
        "Приказ: действовать по обстановке.", "Инициатива на нашей стороне.",
        "Противник не должен уйти.", "Удержать позиции любой ценой."
      ];

      // ЗЕРКАЛЬНЫЕ ПАРЫ ЗАДАЧ (ключ: [атакующая, обороняющаяся])
      const conflictPairs = {
        capture: [
          ["Захватить контрольную точку «Альфа» и удерживать 7 минут", "Оборонять контрольную точку «Альфа» и не допустить захвата"],
          ["Занять здание штаба и забаррикадироваться", "Выбить противника из здания штаба"],
          ["Захватить мост и блокировать переправу", "Отбить мост и открыть путь для подкреплений"],
          ["Овладеть водонапорной башней", "Не дать противнику занять водонапорную башню"],
          ["Захватить высоту 217 и установить флаг", "Удержать высоту 217 и не допустить установки флага"]
        ],
        elimination: [
          ["Ликвидировать вражеского командира (красная повязка)", "Защитить своего командира любой ценой"],
          ["Уничтожить вражеский пулемётный расчёт", "Оборонять пулемётную позицию до подхода основных сил"],
          ["Нейтрализовать снайпера в лесополосе", "Прикрывать снайпера, пока он меняет позицию"],
          ["Зачистить три здания от противника", "Удержать три здания и не дать противнику войти"],
          ["Ликвидировать диверсионную группу в тылу", "Провести диверсию в тылу врага и уйти без потерь"]
        ],
        intel: [
          ["Найти и изъять кейс с документами (спрятан в тайнике)", "Защитить тайник с документами, не дать изъять"],
          ["Взломать терминал и скачать данные (удерживать 3 мин)", "Оборонять терминал, не допустить взлома"],
          ["Перехватить курьера и забрать флеш-накопитель", "Провести курьера через опасную зону"],
          ["Сфотографировать замаскированные контейнеры", "Помешать фотографированию контейнеров"],
          ["Обследовать госпиталь и найти карту минных полей", "Спрятать или уничтожить карту минных полей"]
        ],
        escort: [
          ["Провести VIP-персону из точки А в точку Б", "Перехватить и задержать VIP-персону"],
          ["Защитить генератор помех в течение 10 минут", "Уничтожить генератор помех"],
          ["Эвакуировать раненого пилота к зоне эвакуации", "Не дать эвакуировать пилота, взять в плен"],
          ["Сопроводить грузовик с боеприпасами через лес", "Остановить и захватить грузовик с боеприпасами"],
          ["Охранять сапёра, обезвреживающего бомбу", "Помешать сапёру обезвредить бомбу"]
        ],
        demolition: [
          ["Заложить взрывчатку на складе ГСМ", "Разминировать склад ГСМ и обезвредить заряды"],
          ["Уничтожить спутниковую тарелку связи", "Защитить спутниковую тарелку от подрыва"],
          ["Заминировать дорогу и устроить засаду", "Разминировать дорогу и безопасно провести конвой"],
          ["Вывести из строя трансформаторную подстанцию", "Восстановить питание подстанции и отбить атаку"],
          ["Подорвать опору ЛЭП для обесточивания врага", "Предотвратить подрыв опоры ЛЭП"]
        ]
      };

      let currentRule = 'hardcore';
      let lastScenarioSignature = null;
      // Храним историю использованных легенд и задач, чтобы не повторяться
      let usedLegends = new Set();
      let usedTaskPairs = new Set();

      const ruleButtons = document.querySelectorAll('.rule-btn');
      const generateBtn = document.getElementById('generateBtn');
      const scenarioDisplay = document.getElementById('scenarioDisplay');
      const checkCapture = document.getElementById('taskCapture');
      const checkElimination = document.getElementById('taskElimination');
      const checkIntel = document.getElementById('taskIntel');
      const checkEscort = document.getElementById('taskEscort');
      const checkDemolition = document.getElementById('taskDemolition');

      function getRandomElement(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
      function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

      function getActiveTaskKeys() {
        const active = [];
        if (checkCapture.checked) active.push('capture');
        if (checkElimination.checked) active.push('elimination');
        if (checkIntel.checked) active.push('intel');
        if (checkEscort.checked) active.push('escort');
        if (checkDemolition.checked) active.push('demolition');
        return active;
      }

      function generateUniqueLegend() {
        if (usedLegends.size >= 5000) usedLegends.clear();

        let legend = '';
        let attempts = 0;
        const maxAttempts = 100;

        while (attempts < maxAttempts) {
          const intro = getRandomElement(legendIntros);
          const subject = getRandomElement(legendSubjects);
          const action = getRandomElement(legendActions);
          const locationHint = getRandomElement(locations);
          const urgency = getRandomElement(legendUrgency);
          const atmosphere = getRandomElement(atmospheres);

          legend = `${intro} ${subject} ${action} в районе ${locationHint}. ${urgency} Погодные условия: ${atmosphere}.`;

          if (!usedLegends.has(legend)) {
            usedLegends.add(legend);
            return legend;
          }
          attempts++;
        }
        // fallback
        const fallback = `Экстренное сообщение: активность противника в зоне ${getRandomElement(locations)}. ${getRandomElement(legendUrgency)}`;
        usedLegends.add(fallback);
        return fallback;
      }

      function getConflictPair(taskKey) {
        const pairs = conflictPairs[taskKey];
        if (!pairs || pairs.length === 0) {
          return ["Атаковать противника", "Обороняться от атаки"];
        }
        const pair = getRandomElement(pairs);
        // Формируем уникальный ключ пары для избежания повторов
        const pairKey = `${taskKey}:${pair[0]}|${pair[1]}`;
        if (usedTaskPairs.size > 300) usedTaskPairs.clear();
        if (usedTaskPairs.has(pairKey) && pairs.length > 1) {
          for (let p of shuffleArray([...pairs])) {
            const altKey = `${taskKey}:${p[0]}|${p[1]}`;
            if (!usedTaskPairs.has(altKey)) {
              usedTaskPairs.add(altKey);
              return p;
            }
          }
        }
        usedTaskPairs.add(pairKey);
        return pair;
      }

      function generateScenario() {
        const activeKeys = getActiveTaskKeys();
        if (activeKeys.length === 0) {
          scenarioDisplay.innerHTML = `<div style="color:#c78d5c; padding:1rem; text-align:center;">⚠️ Выберите хотя бы один тип боевой задачи</div>`;
          return;
        }

        const selectedKey = getRandomElement(activeKeys);
        const [taskAttacker, taskDefender] = getConflictPair(selectedKey);
        const location = getRandomElement(locations);
        const atmosphere = getRandomElement(atmospheres);
        const legendText = generateUniqueLegend();
        const nameA = getRandomElement(sideNamesA);
        let nameB = getRandomElement(sideNamesB);
        while (nameB === nameA) nameB = getRandomElement(sideNamesB);

        // Случайно определяем, какая сторона атакует, а какая защищается
        const coin = Math.random() < 0.5;
        const teamA = {
          name: nameA,
          task: coin ? taskAttacker : taskDefender,
          role: coin ? 'АТАКА' : 'ОБОРОНА'
        };
        const teamB = {
          name: nameB,
          task: coin ? taskDefender : taskAttacker,
          role: coin ? 'ОБОРОНА' : 'АТАКА'
        };

        const newScenario = {
          location,
          atmosphere,
          legendText,
          teamA,
          teamB,
          rule: currentRule
        };
        lastScenarioSignature = `${legendText}|${teamA.task}|${teamB.task}`;
        renderScenario(newScenario);
      }

      function getRuleDescription(rule) {
        return rule === 'hardcore' 
          ? '☠️ Любое попадание (в любую часть тела, снаряжение) — мгновенно УБИТ. Без перевязок.'
          : '🩸 Попадание в голову / туловище — УБИТ. Попадание в руку/ногу — РАНЕН (необходимо перевязаться в течение 2 минут, иначе убит). Повторное ранение в конечность = убит.';
      }

      function renderScenario(sc) {
        const ruleDesc = getRuleDescription(sc.rule);
        const ruleShort = sc.rule === 'hardcore' ? 'ХАРДКОР' : 'РЕАЛИЗМ';
        const html = `
          <div class="legend-box">
            <div class="legend-title">📖 ЛЕГЕНДА МИССИИ</div>
            <div style="font-size:1.05rem; line-height:1.6;">${sc.legendText}</div>
            <div style="margin-top:1rem; display:flex; flex-wrap:wrap; gap:1.2rem; color:#cfba6b; font-weight:500;">
              <span>📍 ${sc.location}</span>
              <span>🌦️ ${sc.atmosphere}</span>
            </div>
          </div>
          <div class="teams-container">
            <div class="team-block team-alpha">
              <div class="team-name"><span>🔴 ${sc.teamA.name}</span> <span style="font-size:0.8rem; background:#3a2e0c; padding:0.2rem 0.8rem; border-radius:1rem;">${sc.teamA.role}</span></div>
              <div style="font-weight:700; color:#e7b550;">БОЕВАЯ ЗАДАЧА:</div>
              <div class="objective-text">🎯 ${sc.teamA.task}</div>
            </div>
            <div class="team-block team-bravo">
              <div class="team-name"><span>🔵 ${sc.teamB.name}</span> <span style="font-size:0.8rem; background:#1e330e; padding:0.2rem 0.8rem; border-radius:1rem;">${sc.teamB.role}</span></div>
              <div style="font-weight:700; color:#b3d180;">БОЕВАЯ ЗАДАЧА:</div>
              <div class="objective-text">🎯 ${sc.teamB.task}</div>
            </div>
          </div>
          <div class="rules-highlight">
            <span style="font-size:1.6rem;">⚡</span> 
            <span><strong>ПРАВИЛА (${ruleShort}):</strong> ${ruleDesc}</span>
          </div>
          <div class="unique-id">🦂 SCORPGEN · ${sc.location.substring(0,5)}-${Date.now().toString().slice(-4)}</div>
        `;
        scenarioDisplay.innerHTML = html;
      }

      ruleButtons.forEach(btn => {
        btn.addEventListener('click', function() {
          ruleButtons.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          if (this.dataset.rule) currentRule = this.dataset.rule;
        });
      });

      generateBtn.addEventListener('click', generateScenario);

      // При изменении чекбоксов сбрасываем историю повторов задач
      document.querySelectorAll('.task-badge input').forEach(cb => {
        cb.addEventListener('change', () => { usedTaskPairs.clear(); });
      });
    })();
  </script>
</body>
</html>
