<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Генератор сценариев • Страйкбол</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      background: #1a2e1f;
      background-image: radial-gradient(circle at 20% 30%, #2d4a2c 5%, #0f1f12 95%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
    }
    .app-container {
      max-width: 850px;
      width: 100%;
      background: rgba(20, 28, 17, 0.9);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 1.8rem 2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,200,0.2);
      border: 1px solid #5b6e3b;
      color: #e9e7d4;
      transition: all 0.2s;
    }
    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #cfde9e;
      text-shadow: 0 4px 10px #1f3118;
      margin-bottom: 0.3rem;
      word-break: break-word;
    }
    .subtitle {
      text-align: center;
      color: #a6b87e;
      margin-bottom: 2rem;
      font-style: italic;
      border-bottom: 1px dashed #5b6e3b;
      padding-bottom: 0.8rem;
      font-size: 0.95rem;
    }
    .control-panel {
      background: #1e2a18;
      border-radius: 2rem;
      padding: 1.5rem 1.5rem 1.2rem;
      margin-bottom: 2rem;
      border: 1px solid #4a5e35;
      box-shadow: inset 0 2px 7px rgba(0,0,0,0.5);
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .task-badge {
      background: #2d3b1f;
      border: 1px solid #7e9350;
      padding: 0.6rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #d9e6b2;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.5px;
    }
    .task-badge input[type="checkbox"] {
      accent-color: #b9d34b;
      width: 1rem;
      height: 1rem;
      margin-right: 0.2rem;
      cursor: pointer;
      transform: scale(1.1);
    }
    .task-badge:hover {
      background: #3f532b;
      border-color: #b9d34b;
    }
    .rule-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 1.3rem 0 1rem;
    }
    .rule-btn {
      background: #232e18;
      border: 1px solid #5c6a3b;
      color: #cdd8ae;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .rule-btn.active {
      background: #79903b;
      border-color: #d0e586;
      color: #0e1a06;
      box-shadow: 0 0 15px #96b34b;
      font-weight: bold;
    }
    .generate-btn {
      background: #cbad5c;
      border: none;
      color: #1e2c0e;
      font-weight: 800;
      font-size: 1.2rem;
      padding: 0.9rem 2.2rem;
      border-radius: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem auto 0.3rem;
      gap: 0.4rem;
      background: linear-gradient(180deg, #e7c468 0%, #b3923b 100%);
      border: 1px solid #fde482;
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      transition: 0.2s;
      width: fit-content;
    }
    .generate-btn:hover {
      filter: brightness(1.15);
      transform: scale(1.02);
      box-shadow: 0 10px 22px black;
    }
    .scenario-card {
      background: #1e2816;
      border-radius: 2rem;
      padding: 1.8rem;
      border: 1px solid #7e9750;
      box-shadow: 0 15px 25px rgba(0,0,0,0.6);
      margin-top: 1.2rem;
    }
    .legend-box {
      background: #0e140a;
      border-left: 6px solid #b5943b;
      padding: 1.3rem;
      border-radius: 1rem;
      margin-bottom: 1.7rem;
      font-style: normal;
      color: #e3d9b0;
      box-shadow: inset 0 0 12px #000000;
    }
    .legend-title {
      font-weight: 700;
      color: #f3cd70;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.6rem;
      font-size: 0.9rem;
    }
    .teams-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.3rem;
      margin: 1.8rem 0 1rem;
    }
    @media (max-width: 550px) {
      .teams-container {
        grid-template-columns: 1fr;
      }
      .app-container {
        padding: 1.5rem 1.2rem;
      }
    }
    .team-block {
      background: #222f19;
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid;
    }
    .team-alpha {
      border-color: #b89b48;
      background: linear-gradient(145deg, #2a351a, #1b2412);
    }
    .team-bravo {
      border-color: #5b7a4a;
      background: linear-gradient(145deg, #1f2d17, #121f0e);
    }
    .team-name {
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .objective-text {
      background: #0b1307;
      padding: 0.8rem;
      border-radius: 0.9rem;
      color: #dcdfb0;
      font-weight: 500;
      line-height: 1.5;
      margin: 0.5rem 0;
      font-size: 0.95rem;
    }
    .rules-highlight {
      background: #2c3a1c;
      border-radius: 1rem;
      padding: 0.9rem;
      margin: 1.2rem 0 0.5rem;
      font-weight: 600;
      color: #f6e7a7;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px dashed #b9ad4c;
      font-size: 0.95rem;
    }
    .unique-id {
      font-size: 0.7rem;
      color: #5f6d4a;
      text-align: right;
      margin-top: 1rem;
      letter-spacing: 1px;
    }
    hr {
      border-color: #495f2d;
      margin: 1rem 0 0.5rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>⚡ SPECNAZ SCENARIO</h1>
  <div class="subtitle">бесконечные миссии • страйкбол</div>

  <div class="control-panel">
    <div class="badge-row">
      <label class="task-badge"><input type="checkbox" id="taskCapture" checked> Захват точки</label>
      <label class="task-badge"><input type="checkbox" id="taskElimination" checked> Ликвидация</label>
      <label class="task-badge"><input type="checkbox" id="taskIntel" checked> Разведданные</label>
      <label class="task-badge"><input type="checkbox" id="taskEscort" checked> Эскорт / защита</label>
      <label class="task-badge"><input type="checkbox" id="taskDemolition" checked> Подрыв / саботаж</label>
    </div>

    <div class="rule-selector">
      <span style="color:#b9b382; margin-right:0.3rem; font-weight:600;">⚙️ Правила ранений:</span>
      <button class="rule-btn active" data-rule="hardcore">ХАРДКОР: любое попадание = убит</button>
      <button class="rule-btn" data-rule="realistic">РЕАЛИЗМ: голова/туловище убит, конечность ранен</button>
    </div>

    <button class="generate-btn" id="generateBtn">↻ СГЕНЕРИРОВАТЬ СЦЕНАРИЙ</button>
  </div>

  <div class="scenario-card" id="scenarioDisplay">
    <!-- динамическое наполнение -->
  </div>
</div>

<script>
  (function() {
    // ---------- БАЗЫ ДАННЫХ ДЛЯ БЕСКОНЕЧНЫХ КОМБИНАЦИЙ ----------
    const locations = [
      "Заброшенный завод «Сталь-9»", "Лесной полигон «Туман»", "Горный перевал «Орлиное гнездо»",
      "Поселок «Северный» (руины)", "Бункер 42-бис", "Нефтебаза «Черное золото»",
      "Ж/д станция «Узловая»", "Портовая зона «Док-7»", "Пустынный форт «Мирамар»",
      "Подземный тоннель «Крот»", "Затопленный ангар", "Химический завод «Вихрь»",
      "Лесопилка «Глухомань»", "Складской комплекс «Терминал»", "Радиовышка «Эхо»"
    ];

    const atmospheres = [
      "густой туман, видимость 20 метров", "проливной дождь и скользкая грязь",
      "ранние сумерки, длинные тени", "пасмурное небо, ветер 10 м/с",
      "солнечный полдень, жара +32°C", "ночная операция, только ПНВ",
      "дым от лесного пожара поблизости", "снежные заносы, -5°C", "туман и запах гари"
    ];

    const sideNamesA = ["Альфа", "Волкодавы", "Группа «Шторм»", "Отряд «Корсар»", "Сектор 7", "Ястребы"];
    const sideNamesB = ["Браво", "Теневики", "Картель «Черный»", "Ополчение «Восток»", "Наёмники «Гадюка»", "Фантом"];

    const legendsPool = [
      "Местные передали разведданные: в районе замечена активность вражеских диверсантов. Командование требует немедленных действий.",
      "После падения спутника связи противник пытается захватить обломки с секретной технологией.",
      "Гуманитарный конвой был атакован. Необходимо восстановить контроль и найти выживших.",
      "Под прикрытием лесных пожаров враг минирует подходы к ключевому мосту.",
      "Двойной агент сообщил о готовящемся покушении на командира союзников во время эвакуации.",
      "Запасы воды истощены. Единственный источник находится на нейтральной территории, которую нужно удержать.",
      "В бункере активирован аварийный протокол: системы самоуничтожения запущены. Нужно остановить или использовать.",
      "Радиоперехват: вражеский генерал инспектирует передовую. Отличная возможность для удара.",
      "Артефакт (контейнер с данными) обнаружен в заброшенной лаборатории. Обе стороны стремятся завладеть им."
    ];

    // Боевые задачи (пулы)
    const taskTypes = {
      capture: [
        "Захватить и удерживать контрольную точку «Альфа» не менее 5 минут.",
        "Занять здание штаба и не допустить проникновения противника.",
        "Контролировать мост/переправу до прибытия подкрепления.",
        "Захватить высоту 217 и установить флаг."
      ],
      elimination: [
        "Уничтожить командира вражеского отряда (особая повязка).",
        "Ликвидировать всех бойцов противника в заданном квадрате.",
        "Нейтрализовать вражеского снайпера в лесополосе.",
        "Устранить трёх designated marksman противника."
      ],
      intel: [
        "Найти и изъять кейс с разведданными (3 возможных тайника).",
        "Сфотографировать/считать QR-коды на объектах без поднятия тревоги.",
        "Перехватить курьера и забрать флеш-накопитель.",
        "Обследовать бункер и скопировать данные с терминала (удерживать 2 мин)."
      ],
      escort: [
        "Провести VIP-персону (игрок с жёлтой повязкой) из точки А в точку Б.",
        "Защитить генератор помех в течение 10 минут.",
        "Эвакуировать раненого пилота (манекен/носилки) к зоне эвакуации.",
        "Сопроводить грузовик с боеприпасами через опасный сектор."
      ],
      demolition: [
        "Заложить взрывчатку на вражеском складе (имитация) и отойти.",
        "Уничтожить спутниковую тарелку (подрыв/снятие элемента).",
        "Заминировать дорогу и устроить засаду на конвой.",
        "Вывести из строя генераторную подстанцию."
      ]
    };

    // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ----------
    let currentRule = 'hardcore'; // 'hardcore' или 'realistic'
    let lastScenarioSignature = null; // для предотвращения прямых повторов

    // DOM элементы
    const ruleButtons = document.querySelectorAll('.rule-btn');
    const generateBtn = document.getElementById('generateBtn');
    const scenarioDisplay = document.getElementById('scenarioDisplay');
    // чекбоксы задач
    const checkCapture = document.getElementById('taskCapture');
    const checkElimination = document.getElementById('taskElimination');
    const checkIntel = document.getElementById('taskIntel');
    const checkEscort = document.getElementById('taskEscort');
    const checkDemolition = document.getElementById('taskDemolition');

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function getRandomElement(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // Перемешивание массива (Фишер-Йетс)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Собираем активные типы задач на основе чекбоксов
    function getActiveTaskKeys() {
      const active = [];
      if (checkCapture.checked) active.push('capture');
      if (checkElimination.checked) active.push('elimination');
      if (checkIntel.checked) active.push('intel');
      if (checkEscort.checked) active.push('escort');
      if (checkDemolition.checked) active.push('demolition');
      return active;
    }

    // Генерируем уникальную строку-подпись (для избежания повторов)
    function buildSignature(teamAObj, teamBObj, rule, location, legend) {
      return `${location}|${legend}|${teamAObj.task}|${teamBObj.task}|${rule}`;
    }

    // Получить задачу для стороны по ключу типа (случайный выбор из pool)
    function getRandomTaskByKey(taskKey) {
      const pool = taskTypes[taskKey];
      if (!pool || pool.length === 0) return "Нейтрализовать противника.";
      return getRandomElement(pool);
    }

    // Выбор двух разных задач для команд (из активных типов)
    function selectDistinctTasks(activeKeys) {
      if (activeKeys.length === 0) {
        // fallback: если ничего не выбрано, используем захват и ликвидацию
        return ['capture', 'elimination'];
      }
      if (activeKeys.length === 1) {
        // дублируем одну задачу, но с разным текстом (разные формулировки из пула)
        return [activeKeys[0], activeKeys[0]];
      }
      // выбираем два разных случайных ключа
      const shuffled = shuffleArray([...activeKeys]);
      return [shuffled[0], shuffled[1]];
    }

    // Генерация полного сценария
    function generateScenario() {
      const activeKeys = getActiveTaskKeys();
      if (activeKeys.length === 0) {
        scenarioDisplay.innerHTML = `<div style="color:#c78d5c; padding:1rem; text-align:center;">⚠️ Выберите хотя бы один тип боевой задачи (захват, ликвидация и т.д.)</div>`;
        return;
      }

      // Попытки избежать повтора (макс 15 попыток)
      let attempts = 0;
      const maxAttempts = 20;
      let newScenario = null;
      let signature = null;

      while (attempts < maxAttempts) {
        // Выбираем локацию, легенду, атмосферу
        const location = getRandomElement(locations);
        const atmosphere = getRandomElement(atmospheres);
        const legendText = getRandomElement(legendsPool);
        
        // Названия сторон
        const nameA = getRandomElement(sideNamesA);
        let nameB = getRandomElement(sideNamesB);
        while (nameB === nameA) {
          nameB = getRandomElement(sideNamesB);
        }

        // Выбираем две разные задачи (ключи) для команд
        const [taskKeyA, taskKeyB] = selectDistinctTasks(activeKeys);
        
        // Получаем конкретные тексты задач
        let taskTextA = getRandomTaskByKey(taskKeyA);
        let taskTextB = getRandomTaskByKey(taskKeyB);
        
        // Если ключи одинаковые, стараемся сделать разные формулировки
        if (taskKeyA === taskKeyB) {
          // пробуем взять другую формулировку из того же пула
          const pool = taskTypes[taskKeyA];
          if (pool && pool.length > 1) {
            let altTask = getRandomElement(pool);
            let attemptsInner = 0;
            while (altTask === taskTextA && attemptsInner < 10) {
              altTask = getRandomElement(pool);
              attemptsInner++;
            }
            taskTextB = altTask;
          }
        }

        const rule = currentRule;
        signature = buildSignature(
          { task: taskTextA, key: taskKeyA },
          { task: taskTextB, key: taskKeyB },
          rule,
          location,
          legendText
        );

        if (signature !== lastScenarioSignature) {
          newScenario = {
            location, atmosphere, legendText,
            teamA: { name: nameA, task: taskTextA, taskKey: taskKeyA },
            teamB: { name: nameB, task: taskTextB, taskKey: taskKeyB },
            rule
          };
          break;
        }
        attempts++;
      }

      // Если не смогли избежать повтора (крайне редко) — берем последний сгенерированный
      if (!newScenario) {
        const location = getRandomElement(locations);
        const atmosphere = getRandomElement(atmospheres);
        const legendText = getRandomElement(legendsPool);
        const nameA = getRandomElement(sideNamesA);
        let nameB = getRandomElement(sideNamesB);
        while (nameB === nameA) nameB = getRandomElement(sideNamesB);
        const [taskKeyA, taskKeyB] = selectDistinctTasks(activeKeys.length ? activeKeys : ['capture','elimination']);
        const taskTextA = getRandomTaskByKey(taskKeyA);
        const taskTextB = getRandomTaskByKey(taskKeyB);
        newScenario = {
          location, atmosphere, legendText,
          teamA: { name: nameA, task: taskTextA, taskKey: taskKeyA },
          teamB: { name: nameB, task: taskTextB, taskKey: taskKeyB },
          rule: currentRule
        };
        signature = buildSignature(newScenario.teamA, newScenario.teamB, currentRule, location, legendText);
      }

      lastScenarioSignature = signature;
      renderScenario(newScenario);
    }

    // Правила ранений текстом
    function getRuleDescription(rule) {
      if (rule === 'hardcore') {
        return '☠️ Любое попадание (в любую часть тела, снаряжение) — мгновенно УБИТ. Без перевязок.';
      } else {
        return '🩸 Попадание в голову / туловище — УБИТ. Попадание в руку/ногу — РАНЕН (необходимо перевязаться в течение 2 минут, иначе убит). Повторное ранение в конечность = убит.';
      }
    }

    function renderScenario(sc) {
      const ruleDesc = getRuleDescription(sc.rule);
      const ruleShort = sc.rule === 'hardcore' ? 'ХАРДКОР' : 'РЕАЛИЗМ';

      const html = `
        <div class="legend-box">
          <div class="legend-title">📖 ЛЕГЕНДА</div>
          <div style="font-size:1.05rem; line-height:1.5;">${sc.legendText}</div>
          <div style="margin-top:0.8rem; display:flex; flex-wrap:wrap; gap:1rem; color:#c7bc82;">
            <span>📍 ${sc.location}</span>
            <span>🌦️ ${sc.atmosphere}</span>
          </div>
        </div>

        <div class="teams-container">
          <div class="team-block team-alpha">
            <div class="team-name"><span>🔴 ${sc.teamA.name}</span></div>
            <div style="font-weight:700; color:#deb887;">БОЕВАЯ ЗАДАЧА:</div>
            <div class="objective-text">🎯 ${sc.teamA.task}</div>
          </div>
          <div class="team-block team-bravo">
            <div class="team-name"><span>🔵 ${sc.teamB.name}</span></div>
            <div style="font-weight:700; color:#a5c98a;">БОЕВАЯ ЗАДАЧА:</div>
            <div class="objective-text">🎯 ${sc.teamB.task}</div>
          </div>
        </div>

        <div class="rules-highlight">
          <span style="font-size:1.4rem;">⚡</span> 
          <span><strong>ПРАВИЛА РАНЕНИЙ (${ruleShort}):</strong> ${ruleDesc}</span>
        </div>
        <div class="unique-id">ID: ${sc.location.substring(0,4)}-${sc.teamA.name.substring(0,3)}-${Date.now().toString().slice(-4)}</div>
      `;

      scenarioDisplay.innerHTML = html;
    }

    // Обработчики переключения правил
    ruleButtons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        ruleButtons.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const rule = this.dataset.rule;
        if (rule === 'hardcore' || rule === 'realistic') {
          currentRule = rule;
        }
        // Автоматически не генерируем, ждём нажатия кнопки (можно и сразу, но пусть пользователь контролирует)
      });
    });

    // Генерация по кнопке
    generateBtn.addEventListener('click', generateScenario);

    // Инициализация: генерируем первый сценарий сразу
    window.addEventListener('DOMContentLoaded', () => {
      // убедимся, что currentRule соответствует активной кнопке
      const activeRuleBtn = document.querySelector('.rule-btn.active');
      if (activeRuleBtn && activeRuleBtn.dataset.rule) {
        currentRule = activeRuleBtn.dataset.rule;
      }
      generateScenario();
    });

    // Дополнительно: если меняют чекбоксы, можно не сбрасывать, просто следующий сценарий учтёт
  })();
</script>
</body>
</html>
